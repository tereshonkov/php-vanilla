services:
  php-starter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-starter
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - php-network
    depends_on:
      php-db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: php-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - php-network
    depends_on:
      - php-starter

  php-db:
    image: mysql:8.4
    container_name: php-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - php-network
    healthcheck: # ждем пока БД не станет
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: php-redis
    restart: always
    command: redis-server --save "" --appendonly no
    networks:
      - php-network

volumes:
  mysql_data:

networks:
  php-network:
    driver: bridge